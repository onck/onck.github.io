<!DOCTYPE html>
<html lang="id">
	<head>
		<meta name="viewport" content="device-width, initial-scale=1.0">
		<meta charset="UTF-8">
		<title>objek 3D</title>
		<style>
		body {
			background-color: black;
		}
			.lingkaran3d {
				width: 100px;
				height: 100px;
				border-radius: 50%;
				background-color: rgba(255, 255, 255, 0.2);
				border: 3px solid rgba(0, 255, 200, 1.0);
				position: absolute;
				left:50%;
				top:50%;
				transform: translate(-50%,-50%);
			}
		</style>
	</head>
	<body>
	<div class="lingkaran3d"></div>
	</body>
	</html>
